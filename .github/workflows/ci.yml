name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Biome check
        run: npx biome check

      - name: TypeScript type check
        run: npx tsc --noEmit

  test-migrations:
    name: Test Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start -x studio,imgproxy,inbucket,postgrest,gotrue,realtime,storage-api,edge-runtime,logflare,vector,supavisor

      - name: Verify migrations applied
        run: supabase migration list --local
